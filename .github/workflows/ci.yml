name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PHP_VERSION: '8.2'
  NODE_VERSION: '18'

jobs:
  tests:
    name: Tests & Code Quality
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0.39
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: fiszki_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, dom, filter, gd, json
          coverage: xdebug
          tools: composer:v2, symfony-cli

      - name: Validate composer.json
        run: composer validate --strict

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Create .env.test.local
        run: |
          echo "APP_ENV=test" > .env.test.local
          echo "APP_SECRET=test_secret_key_for_ci_testing" >> .env.test.local
          echo "DATABASE_URL=mysql://root:password@127.0.0.1:3306/fiszki_test?serverVersion=8.0.39&charset=utf8mb4" >> .env.test.local
          echo "MAILER_DSN=null://null" >> .env.test.local
          echo "OPEN_AI_KEY=test_key" >> .env.test.local
          echo "AI_MODEL=gpt-3.5-turbo" >> .env.test.local
          echo "AI_TEMPERATURE=0.7" >> .env.test.local
          echo "AI_MAX_TOKENS=1000" >> .env.test.local

      - name: Run database migrations
        run: |
          php bin/console doctrine:database:create --if-not-exists --env=test
          php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Load fixtures
        run: php bin/console doctrine:fixtures:load --no-interaction --env=test

      - name: Check Symfony requirements
        run: symfony check:requirements

      - name: Check security vulnerabilities
        run: symfony check:security

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --level=6 --no-progress

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --coverage-clover coverage.xml

      - name: Run Behat tests
        run: vendor/bin/behat --format=progress --no-interaction

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: success()
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  code-style:
    name: Code Style
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: php-cs-fixer

      - name: Run PHP CS Fixer
        run: |
          php-cs-fixer fix --dry-run --diff --verbose --using-cache=no

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [tests, code-style]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: github.event_name != 'pull_request'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME }}/fiszki
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/php/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PHP_VERSION=${{ env.PHP_VERSION }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://fiszki.example.com
    
    steps:
      - name: Deploy to server
        run: |
          echo "Deployment step - configure based on your hosting solution"
          echo "This could be SSH deploy, Kubernetes, AWS ECS, etc."
          # Example SSH deployment:
          # - uses: appleboy/ssh-action@v0.1.5
          #   with:
          #     host: ${{ secrets.HOST }}
          #     username: ${{ secrets.USERNAME }}
          #     key: ${{ secrets.SSH_KEY }}
          #     script: |
          #       cd /var/www/fiszki
          #       docker-compose pull
          #       docker-compose up -d
          #       docker-compose exec -T php-fpm php bin/console doctrine:migrations:migrate --no-interaction
          #       docker-compose exec -T php-fpm php bin/console cache:clear